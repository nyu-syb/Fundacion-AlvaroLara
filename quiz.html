<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulacro ICFES</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="quiz-page">
  <header class="header-panel">
    <div class="brand-panel">
      <div class="brand-mark">
        <img src="imagenes/logo.png" alt="Fundación Álvaro Lara" />
      </div>
      <div>
        <h1>Simulacro tipo ICFES</h1>
        <p>Practica por materia y revisa tus aciertos y errores</p>
      </div>
    </div>
    <a href="interfas.html" class="btn-nav">Volver</a>
  </header>

  <main class="quiz-main">
    <section class="quiz-card">
      <div id="quiz-intro" class="quiz-intro">
        <span class="quiz-badge">Prueba personalizada</span>
        <h2 id="quiz-title">Cargando simulacro...</h2>
        <p id="quiz-description">Selecciona una materia para comenzar.</p>
        <button id="start-quiz" class="btn-principal">Iniciar test</button>
      </div>

      <div id="quiz-container" class="quiz-container hidden">
        <div class="quiz-progress">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div class="quiz-meta">
          <span id="question-counter">Pregunta 1 de 20</span>
          <span id="subject-label">Materia</span>
        </div>
        <h3 id="question-text"></h3>
        <div id="options-list" class="options-list"></div>
        <div class="quiz-actions">
          <button id="next-question" class="btn-secundario">Siguiente</button>
        </div>
      </div>

      <div id="quiz-results" class="quiz-results hidden">
        <h3>Resultado del test</h3>
        <p id="score-summary"></p>
        <div class="score-grid">
          <div class="score-box">
            <strong id="correct-count">0</strong>
            <span>Correctas</span>
          </div>
          <div class="score-box">
            <strong id="wrong-count">0</strong>
            <span>Incorrectas</span>
          </div>
          <div class="score-box">
            <strong id="percent-count">0%</strong>
            <span>Porcentaje</span>
          </div>
        </div>
        <div id="wrong-list" class="wrong-list"></div>
        <a href="interfas.html" class="btn-principal">Volver al panel</a>
      </div>
    </section>
  </main>

  <script src="quiz-utils.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
